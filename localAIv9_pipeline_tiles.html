    code: `# ── 2. LLM Client (Ollama) ───────────────────────────────────────────

def _cache_key(prompt: str) -> str:
    return hashlib.md5(prompt.encode()).hexdigest()

async def ask_llm(
    prompt: str,
    temperature: float = 0.15,
    max_tokens: int = 2000,
) -> dict:
    """Call Ollama, return parsed JSON, with MD5 disk caching."""
    key        = _cache_key(prompt)
    cache_file = CACHE_DIR / f"{key}.json"

    # ── Cache hit ────────────────────────────────────────────────────
    if cache_file.exists():
        return json.loads(cache_file.read_text())

    # ── Live call ────────────────────────────────────────────────────
    url     = f"{OLLAMA_HOST}/api/generate"
    payload = {
        "model":  MODEL,
        "prompt": prompt,
        "stream": False,
        "options": {
            "temperature": temperature,
            "num_predict": max_tokens,
        },
    }
    async with httpx.AsyncClient(timeout=120.0) as client:
        resp = await client.post(url, json=payload)
        resp.raise_for_status()
        text = resp.json()["response"]

    # ── Extract first JSON object ────────────────────────────────────
    start = text.find('{')
    end   = text.rfind('}') + 1
    if start != -1 and end != 0:
        try:
            result = json.loads(text[start:end])
            cache_file.write_text(json.dumps(result))
            return result
        except json.JSONDecodeError:
            pass

    # ── Fallback ─────────────────────────────────────────────────────
    result = {"error": "invalid_json", "raw": text}
    cache_file.write_text(json.dumps(result))
    return result`

    Assigns T-IDs to DAG nodes and computes per-layer time estimates:
      frontend  → 30 s
      backend   → 45 s
      fullstack → 60 s
    """
    tasks     = []
    layer_map = {f["name"]: f["layer"] for f in step1_out.features}

    for idx, node in enumerate(step5_out.final_dag, start=1):
        layer = layer_map.get(node.id, "fullstack")
        est   = 30 if layer == "frontend" else 45 if layer == "backend" else 60

        # Resolve dependency names → T-IDs
        dep_ids = []
        for dep_name in node.depends_on:
            for i, n in enumerate(step5_out.final_dag, start=1):
                if n.id == dep_name:
                    dep_ids.append(f"T{i:03d}")
                    break

        tasks.append(ScheduledTask(
            id=f"T{idx:03d}",
            depends_on=dep_ids,
            layer=layer,
            est_seconds=est,
        ))

    return Step6Output(scheduled_tasks=tasks)`

class Session:
    def __init__(self):

    def log(
        self,
        step: int,

        output_data: Any,
        latency_ms: int,
        tool_calls: List[Dict] = None,

        elif hasattr(obj, "__dict__"):

tiles.forEach((t, i) => {

  tile.className = 'tile';

  const tagsHtml = t.tags.map(([label, cls]) =>
    `<span class="tag ${cls}">${label}</span>`

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const chev = document.getElementById('chev-' + i);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}
